name: Frontend CI

on:
  pull_request:
  repository_dispatch:
    types:
      - docs-contract-changed

permissions:
  actions: read
  contents: read

jobs:
  build:
    runs-on:
      group: livemask-ci
      labels: [self-hosted, linux, livemask, docker, ci]
    steps:
      - uses: actions/checkout@v4
      - name: Install
        run: |
          if [[ ! -f package.json ]]; then
            echo "package.json not found; scaffold repository, skip frontend build."
            exit 0
          fi
          npm ci
      - name: Build
        run: |
          if [[ ! -f package.json ]]; then
            echo "package.json not found; scaffold repository, skip frontend build."
            exit 0
          fi
          npm run build

  notify-lark:
    needs: [build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Notify Lark
        env:
          GITHUB_TOKEN: ${{ github.token }}
          LARK_BOT_WEBHOOK: ${{ secrets.LARK_BOT_WEBHOOK }}
          LARK_BOT_SECRET: ${{ secrets.LARK_BOT_SECRET }}
          WORKFLOW_RESULT: ${{ needs.build.result }}
        run: bash .github/scripts/lark-notify.sh "$WORKFLOW_RESULT"
